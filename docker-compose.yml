services:
  caddy:
    image: caddy:2-alpine
    container_name: boogie-caddy
    restart: unless-stopped
    environment:
      - MONITORING_PASSWORD_HASH=${MONITORING_PASSWORD_HASH}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    networks:
      - boogie

  api:
    image: boogie-backend:latest
    container_name: boogie-backend
    restart: unless-stopped
    env_file:
      - /opt/boogie-backend/.env
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - boogie

  redis:
    image: redis:7-alpine
    container_name: boogie-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 3
    networks:
      - boogie

  prometheus:
    image: prom/prometheus:latest
    container_name: boogie-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    networks:
      - boogie

  grafana:
    image: grafana/grafana:latest
    container_name: boogie-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-boogie2026}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana.boogierent.com
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    expose:
      - "3000"
    depends_on:
      - prometheus
    networks:
      - boogie

volumes:
  caddy_data:
  caddy_config:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  boogie:
    driver: bridge
